# Runs Sentinel joined to an already-running victim's Docker network so it can reach it by
# container name (e.g. http://api-gateway:8080) instead of localhost. Works against any
# victim with its own docker-compose stack, not a specific one - point .env at whichever
# one you're currently testing.
#
# Plug-and-play setup:
#   1. Start the victim stack first (from its own repo): docker compose up -d
#   2. cp .env.example .env, then edit the values inside for the victim you're targeting
#      right now (docker network ls tells you the real network name - see .env.example
#      for how Compose derives it). That's the only manual step; `docker compose up` below
#      reads .env automatically from now on, every time, no shell exports needed. Switching
#      to a different victim later just means editing .env again.
#   3. docker compose up -d --build
#
# If SENTINEL_SCAN_AUTO_TARGET_URL is also set in .env, that's the whole procedure - Sentinel
# waits for the victim to actually be accepting requests on its own (most victim projects have
# no startup healthcheck, so there's no other way to know) and then scans it automatically, no
# manual POST /api/scans required. Fetch the result whenever you want it:
#   GET http://localhost:8088/api/scans/latest
#
# Without SENTINEL_SCAN_AUTO_TARGET_URL, trigger scans by hand instead:
#   POST http://localhost:8088/api/scans  {"targetUrl": "http://<victim-entrypoint>:<port>"}
#
# Every scan is also saved as a JSON file under ./reports on your host (bind-mounted below),
# so results survive `docker compose down` and can be reviewed without hitting the API.

services:
  sentinel:
    build: .
    container_name: sentinel
    ports:
      - "8088:8080"
    environment:
      SENTINEL_SCAN_MAX_ENDPOINTS: ${SENTINEL_SCAN_MAX_ENDPOINTS:-25}
      SENTINEL_SCAN_AUTO_TARGET_URL: ${SENTINEL_SCAN_AUTO_TARGET_URL:-}
      SENTINEL_SCAN_SQL_INJECTION_ENABLED: ${SENTINEL_SCAN_SQL_INJECTION_ENABLED:-true}
      SENTINEL_SCAN_MISSING_AUTHENTICATION_ENABLED: ${SENTINEL_SCAN_MISSING_AUTHENTICATION_ENABLED:-true}
      SENTINEL_SCAN_ALLOWED_HTTP_METHODS: ${SENTINEL_SCAN_ALLOWED_HTTP_METHODS:-GET,POST,PUT,PATCH,DELETE}
    volumes:
      - ./reports:/app/reports
    networks:
      - victim-network

networks:
  victim-network:
    external: true
    name: ${VICTIM_NETWORK_NAME:?Set VICTIM_NETWORK_NAME in your .env file (copy .env.example) to the current victim's Docker network name}
