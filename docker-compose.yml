# Runs Sentinel joined to an already-running victim's Docker network so it can reach it by
# container name (e.g. http://api-gateway:8080) instead of localhost.
#
# Plug-and-play setup:
#   1. Start the victim stack first (from its own repo): docker compose up -d
#   2. cp .env.example .env, then edit the one value inside to match the victim's actual
#      Docker network name (docker network ls tells you the real name - see .env.example
#      for how Compose derives it). That's the only manual step; `docker compose up` below
#      reads .env automatically from now on, every time, no shell exports needed.
#   3. docker compose up -d --build
#   4. Wait for the victim's entry point to actually be accepting requests (most projects
#      have no healthcheck on their own app containers, so Sentinel can't wait on it
#      automatically) before scanning:
#        POST http://localhost:8088/api/scans  {"targetUrl": "http://api-gateway:8080"}

services:
  sentinel:
    build: .
    container_name: sentinel
    ports:
      - "8088:8080"
    environment:
      # aquarium-ms exposes 46+ REST endpoints across 7 services behind the gateway; raise the
      # per-scan cap so a full pass isn't truncated (default is 25).
      SENTINEL_SCAN_MAX_ENDPOINTS: "200"
    networks:
      - aquarium-network

networks:
  aquarium-network:
    external: true
    name: ${AQUARIUM_NETWORK_NAME:-aquarium-ms_aquarium-network}
