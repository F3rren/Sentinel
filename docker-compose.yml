# Runs Sentinel joined to an already-running victim's Docker network so it can reach it by
# container name (e.g. http://api-gateway:8080) instead of localhost.
#
# Usage against aquarium-ms:
#   1. Start aquarium-ms first (from its own repo): docker compose up -d
#   2. Find the actual network name Compose created for it: docker network ls | grep aquarium-network
#      (Compose prefixes it with the project name, e.g. "aquarium-ms_aquarium-network", unless
#      aquarium-ms's compose file sets an explicit top-level `name:` on the network.)
#   3. If it differs from the default below, export AQUARIUM_NETWORK_NAME accordingly:
#        AQUARIUM_NETWORK_NAME=aquarium-ms_aquarium-network docker compose up -d --build
#   4. Wait for aquarium-ms's api-gateway to actually be accepting requests (it has no
#      healthcheck of its own, so Sentinel can't wait on it automatically) before scanning:
#        POST http://localhost:8088/api/scans  {"targetUrl": "http://api-gateway:8080"}

services:
  sentinel:
    build: .
    container_name: sentinel
    ports:
      - "8088:8080"
    environment:
      # aquarium-ms exposes 46+ REST endpoints across 7 services behind the gateway; raise the
      # per-scan cap so a full pass isn't truncated (default is 25).
      SENTINEL_SCAN_MAX_ENDPOINTS: "200"
    networks:
      - aquarium-network

networks:
  aquarium-network:
    external: true
    name: ${AQUARIUM_NETWORK_NAME:-aquarium-ms_aquarium-network}
