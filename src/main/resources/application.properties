spring.application.name=sentinel

# Sentinel scan engine configuration
sentinel.scan.user-agent=Sentinel-Scanner/0.1 (+authorized-security-testing)
sentinel.scan.request-timeout-ms=8000
sentinel.scan.connect-timeout-ms=5000
sentinel.scan.max-endpoints=25

# Every completed scan is also saved as a pretty-printed JSON file here (relative to the
# working directory unless absolute), named <timestamp>-<host>-<scanId>.json. Set to an empty
# value to disable file persistence and rely only on the in-memory store / REST API.
sentinel.scan.reports-directory=reports

# Only endpoints whose HTTP method is in this list are actually attacked (discovery still
# finds all of them, for the report). Handy to restrict a scan to read-only verbs, e.g.
# sentinel.scan.allowed-http-methods=GET to avoid touching anything that mutates state.
sentinel.scan.allowed-http-methods=GET,POST,PUT,PATCH,DELETE

# If set, Sentinel automatically scans this URL on startup once it becomes reachable - no
# manual POST /api/scans needed. Leave empty (default) to only scan on request.
sentinel.scan.auto-target-url=
sentinel.scan.auto-scan-max-attempts=20
sentinel.scan.auto-scan-retry-delay-ms=3000

# Per-module on/off switch, one property per attack module. Every module defaults to
# enabled; set to false to skip it entirely (the module isn't even instantiated).
sentinel.scan.sql-injection.enabled=true
sentinel.scan.missing-authentication.enabled=true
